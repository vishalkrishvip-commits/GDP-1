<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FreshMart - Grocery Delivery</title>
  <link rel="stylesheet" href="VIS.CSS">
</head>
<body>

<header>
  <h1>🥦 FreshMart</h1>
  <input type="text" id="search" placeholder="Search groceries...">
  <div class="cart">🛒 <span id="cartCount">0</span></div>
</header>

<section class="products" id="productList"></section>

<aside class="cart-panel">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>

  <label>Delivery Slot:</label>
  <select id="slot">
    <option>Morning 8-11 AM</option>
    <option>Afternoon 12-3 PM</option>
    <option>Evening 5-8 PM</option>
  </select>

  <button onclick="checkout()">Checkout</button>
</aside>

<script src="VIS.JS"></script>
</body>
</html>
